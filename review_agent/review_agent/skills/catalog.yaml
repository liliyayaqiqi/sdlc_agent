skills:
  - name: skill_patch_intake
    description: Parse patch-derived change signals and extract seed symbols.
    required_inputs:
      - patch_changes
    tools: []
  - name: skill_symbol_impact
    description: Run semantic impact sequence for one symbol.
    required_inputs:
      - symbol
    tools:
      - explore.list_candidates
      - explore.classify_freshness
      - explore.parse_file
      - explore.fetch_symbols
      - explore.fetch_references
      - explore.fetch_call_edges
      - explore.get_confidence
  - name: skill_evidence_read
    description: Fetch code snippets and compile command evidence for top files.
    required_inputs:
      - file_keys
    tools:
      - explore.read_file
      - explore.get_compile_command
  - name: skill_cross_repo_breakage
    description: Build cross-repo breakage hypotheses from semantic evidence.
    required_inputs:
      - symbol_impacts
    tools: []
  - name: skill_architecture_risk
    description: Build architecture coupling-risk hypotheses using manifest dependencies.
    required_inputs:
      - symbol_impacts
      - dependency_map
    tools: []

