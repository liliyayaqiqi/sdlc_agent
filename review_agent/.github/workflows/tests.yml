name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]

      - name: Unit and Contract Tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest -q tests/test_context_ingestion.py tests/test_manifest_resolver.py tests/test_patch_parser.py tests/test_tool_client_contracts.py tests/test_orchestrator_agentic.py tests/test_hardening.py

      - name: CLI E2E Tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest -q tests/test_cli_e2e.py
